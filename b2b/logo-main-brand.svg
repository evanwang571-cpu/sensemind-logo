<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="goldM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldS" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0C878"/>
      <stop offset="40%" stop-color="#EDE0A0"/>
      <stop offset="100%" stop-color="#F5EDC0"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- M — 山型，粗 13px，不变 -->
  <path d="M 160,390
           C 185,300 195,240 198,195
           C 205,235 240,295 260,278
           C 278,263 288,248 300,248
           C 312,248 322,263 340,278
           C 360,295 395,235 402,195
           C 405,240 415,300 440,390"
        fill="none" stroke="url(#goldM)" stroke-width="15"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — 细 5px，亮金，轻盈穿越 -->
  <path d="M 425,165
           C 340,115 235,170 248,228
           C 262,288 388,290 348,345
           C 308,395 208,400 185,378"
        fill="none" stroke="url(#goldS)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 品牌文字 ===== -->
  <text x="300" y="495" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48" letter-spacing="4">
    <tspan font-weight="300" fill="#D4AF37">Sense</tspan><tspan font-weight="600" fill="#E8D48B">Mind</tspan>
  </text>

  <text x="300" y="538" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="25" font-weight="400" fill="#C9A84C" letter-spacing="14">
    风味求索
  </text>

  <line x1="230" y1="552" x2="370" y2="552" stroke="#9B7A2E" stroke-width="0.8" opacity="0.3"/>

  <text x="300" y="576" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="11" font-weight="300" fill="#9B7A2E" letter-spacing="5" opacity="0.6">
    从舌尖，到心灵 · 从科学，到艺术
  </text>
</svg>
