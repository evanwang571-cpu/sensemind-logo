  <polygon points="105,60 145,82 145,128 105,150 65,128 65,82"
           fill="url(#goldHex)" fill-opacity="0.03"
           stroke="url(#goldHex)" stroke-width="0.6" stroke-linejoin="round"/>

  <circle cx="105" cy="48" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="157" cy="78" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="157" cy="138" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="105" cy="168" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="53" cy="138" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="53" cy="78" r="2.2" fill="url(#goldHex)" opacity="0.7"/>

  <!-- SM -->
  <path d="M 63,155 C 72,117 78,92 79,75 C 83,92 97,116 105,109 C 113,103 117,97 121,97 C 125,97 129,103 137,109 C 145,116 159,92 163,75 C 164,92 170,117 179,155"
