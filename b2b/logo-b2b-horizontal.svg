<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="goldBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldSM" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#E0C878"/>
    </linearGradient>
  </defs>

  <!-- 六边形徽章 -->
  <polygon points="95,48 145,78 145,138 95,168 45,138 45,78"
           fill="none" stroke="url(#goldBadge)" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="95,63 138,85 138,131 95,153 52,131 52,85"
           fill="url(#goldBadge)" fill-opacity="0.03"
           stroke="url(#goldBadge)" stroke-width="0.5" stroke-linejoin="round" stroke-opacity="0.2"/>

  <!-- 顶点 -->
  <circle cx="95" cy="48" r="2.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="145" cy="78" r="2.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="145" cy="138" r="2.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="95" cy="168" r="2.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="45" cy="138" r="2.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="45" cy="78" r="2.5" fill="url(#goldBadge)" opacity="0.8"/>

  <!-- M -->
  <path d="M 68,148 C 74,128 80,112 81,102 C 83,112 90,126 97,124 C 104,122 111,112 113,102 C 114,112 120,128 126,148"
        fill="none" stroke="url(#goldSM)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S -->
  <path d="M 126,104 C 106,94 88,98 90,112 C 93,126 120,123 113,134 C 106,144 86,145 81,139"
        fill="none" stroke="url(#goldSM)" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 分隔 -->
  <line x1="185" y1="55" x2="185" y2="165" stroke="url(#goldBadge)" stroke-width="0.8" opacity="0.25"/>

  <!-- 文字 -->
  <text x="205" y="108" text-anchor="start"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="600" fill="#D4AF37" letter-spacing="6">
    SENSEMIND
  </text>

  <text x="207" y="138" text-anchor="start"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="17" font-weight="500" fill="#C9A84C" letter-spacing="8">
    风味求索
  </text>

  <text x="207" y="158" text-anchor="start"
        font-family="'PingFang SC', 'Noto Sans SC', sans-serif"
        font-size="9" font-weight="400" fill="#8B7A4E" letter-spacing="3" opacity="0.6">
    风味求索（杭州）生物科技有限公司
  </text>
</svg>
