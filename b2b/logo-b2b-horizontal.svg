<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 240" width="830" height="240">
  <defs>
    <linearGradient id="goldHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49D30"/>
      <stop offset="100%" stop-color="#9B7A2E"/>
    </linearGradient>
    <linearGradient id="goldS" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0C878"/>
      <stop offset="40%" stop-color="#EDE0A0"/>
      <stop offset="100%" stop-color="#F5EDC0"/>
    </linearGradient>
  </defs>

  <!-- ===== 左侧：六边形 + SM ===== -->
  <!-- 六边形外框 -->
  <polygon points="105,45 157,75 157,135 105,165 53,135 53,75"
           fill="none" stroke="url(#goldHex)" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="105,60 145,82 145,128 105,150 65,128 65,82"
           fill="url(#goldHex)" fill-opacity="0.03"
           stroke="url(#goldHex)" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- 顶点 -->
  <circle cx="105" cy="45" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="157" cy="75" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="157" cy="135" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="105" cy="165" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="53" cy="135" r="2.2" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="53" cy="75" r="2.2" fill="url(#goldHex)" opacity="0.7"/>

  <!-- M — 粗 9px -->
  <path d="M 76,148 C 82,120 87,100 88,88 C 91,100 100,118 107,114 C 113,110 118,105 122,105 C 126,105 131,110 137,114 C 144,118 153,100 156,88 C 157,100 162,120 168,148"
        fill="none" stroke="url(#goldM)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — 细 3.5px -->
  <path d="M 168,102 C 143,86 118,96 123,112 C 128,128 168,123 158,138 C 148,152 118,153 111,146"
        fill="none" stroke="url(#goldS)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 分隔线 ===== -->
  <line x1="200" y1="55" x2="200" y2="155" stroke="url(#goldHex)" stroke-width="0.8" opacity="0.25"/>

  <!-- ===== 右侧文字 ===== -->
  <text x="220" y="108" text-anchor="start"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="38" letter-spacing="3">
    <tspan font-weight="300" fill="#D4AF37">Sense</tspan><tspan font-weight="600" fill="#E8D48B">Mind</tspan>
  </text>

  <text x="222" y="138" text-anchor="start"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#C9A84C" letter-spacing="10">
    风味求索
  </text>

  <text x="222" y="158" text-anchor="start"
        font-family="'PingFang SC', 'Noto Sans SC', sans-serif"
        font-size="10" font-weight="400" fill="#8B7A4E" letter-spacing="3" opacity="0.6">
    风味求索（杭州）生物科技有限公司
  </text>
</svg>
