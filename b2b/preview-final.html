<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SenseMind · 最终配色方案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#C9A84C;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;padding:48px 20px}
.container{max-width:1000px;margin:0 auto}
h1{text-align:center;font-size:28px;font-weight:600;letter-spacing:8px;color:#D4AF37;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#8B6918;letter-spacing:6px;margin-bottom:36px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:800px;margin:0 auto 40px auto}
.card{background:#111;border:1px solid #1E1E1E;border-radius:12px;padding:22px;text-align:center}
.card img{width:100%;max-width:260px}
.card .t{margin-top:8px;font-size:14px;color:#E8D48B;letter-spacing:3px;font-weight:500}
.card .d{font-size:11px;color:#6B5A2E;margin-top:3px;line-height:1.6}

.footer{text-align:center;font-size:10px;color:#4A3A1E;line-height:2;margin-top:20px}
.footer a{color:#8B7A4E}
</style>
</head>
<body>
<div class="container">
<h1>SENSEMIND</h1>
<div class="sub">B2B 商务版 · 定稿配色</div>

<div class="grid2">
  <div class="card">
    <img src="logo-b2b-blackgold.svg" alt="经典黑金">
    <div class="t">经典黑金</div>
    <div class="d">官网 · 投标书 · 技术白皮书<br>主方案</div>
  </div>
  <div class="card">
    <img src="logo-b2b-gold-cream.svg" alt="暖白金">
    <div class="t">暖白金</div>
    <div class="d">合同封面 · 名片 · 信笺<br>印刷友好</div>
  </div>
  <div class="card">
    <img src="logo-b2b-gold-eggplant.svg" alt="茄紫金">
    <div class="t">茄紫金</div>
    <div class="d">企业画册 · 产品手册 · PPT<br>限定版 · 品牌差异化</div>
  </div>
  <div class="card">
    <img src="logo-b2b-purple-cream.svg" alt="暖白紫">
    <div class="t">暖白紫</div>
    <div class="d">内部文件 · 技术方案<br>冷色调克制表达</div>
  </div>
</div>

<div class="footer">
在线预览：<a href="https://evanwang571-cpu.github.io/sensemind-logo/b2b/preview-final.html">GitHub Pages</a><br>
文件目录：<code>/Users/evanwang/logo-designs/b2b/</code>
</div>
</div>
</body>
</html>
