<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 660" width="600" height="660">
  <defs>
    <linearGradient id="goldHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49D30"/>
      <stop offset="100%" stop-color="#9B7A2E"/>
    </linearGradient>
    <linearGradient id="goldS" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0C878"/>
      <stop offset="40%" stop-color="#EDE0A0"/>
      <stop offset="100%" stop-color="#F5EDC0"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="600" height="660" fill="url(#bg)"/>

  <!-- ===== 双层六边形（放大包住 SM） ===== -->
  <!-- 外框 r=205，中心(300,270) -->
  <polygon points="300,65 478,167 478,373 300,475 122,373 122,167"
           fill="none" stroke="url(#goldHex)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 内框 r=185 -->
  <polygon points="300,85 460,177 460,363 300,455 140,363 140,177"
           fill="url(#goldHex)" fill-opacity="0.03"
           stroke="url(#goldHex)" stroke-width="1" stroke-linejoin="round"/>

  <!-- 顶点 -->
  <circle cx="300" cy="65" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="478" cy="167" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="478" cy="373" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="300" cy="475" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="122" cy="373" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="122" cy="167" r="3.5" fill="url(#goldHex)" opacity="0.7"/>

  <!-- ===== 艺术版 SM（主品牌坐标） ===== -->
  <path d="M 160,390
           C 185,300 195,240 198,195
           C 205,235 240,295 260,278
           C 278,263 288,248 300,248
           C 312,248 322,263 340,278
           C 360,295 395,235 402,195
           C 405,240 415,300 440,390"
        fill="none" stroke="url(#goldM)" stroke-width="15"
        stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M 425,165
           C 340,115 235,170 248,228
           C 262,288 388,290 348,345
           C 308,395 208,400 185,378"
        fill="none" stroke="url(#goldS)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 品牌文字 ===== -->
  <text x="300" y="528" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48" letter-spacing="4">
    <tspan font-weight="300" fill="#D4AF37">Sense</tspan><tspan font-weight="600" fill="#E8D48B">Mind</tspan>
  </text>

  <text x="300" y="570" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="25" font-weight="400" fill="#C9A84C" letter-spacing="14">
    风味求索
  </text>

  <line x1="200" y1="586" x2="400" y2="586" stroke="url(#goldHex)" stroke-width="0.8" opacity="0.3"/>

  <text x="300" y="610" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', sans-serif"
        font-size="11" font-weight="400" fill="#8B7A4E" letter-spacing="4" opacity="0.7">
    风味求索（杭州）生物科技有限公司
  </text>

  <text x="300" y="632" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="300" fill="#6B5A2E" letter-spacing="5" opacity="0.5">
    FROM SCIENCE TO ART · RELIABLE FLAVOR SOLUTIONS
  </text>
</svg>
