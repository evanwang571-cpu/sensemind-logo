<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 640" width="600" height="640">
  <defs>
    <linearGradient id="goldBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldSM" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#E0C878"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="600" height="640" fill="url(#bg)"/>

  <!-- ===== 六边形徽章外框 ===== -->
  <polygon points="300,106 438,186 438,346 300,426 162,346 162,186"
           fill="none" stroke="url(#goldBadge)" stroke-width="3" stroke-linejoin="round"/>
  <!-- 内框线 -->
  <polygon points="300,128 420,198 420,334 300,404 180,334 180,198"
           fill="url(#goldBadge)" fill-opacity="0.04"
           stroke="url(#goldBadge)" stroke-width="0.8" stroke-linejoin="round" stroke-opacity="0.25"/>

  <!-- ===== 六边形顶点标记 ===== -->
  <circle cx="300" cy="106" r="4" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="438" cy="186" r="4" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="438" cy="346" r="4" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="300" cy="426" r="4" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="162" cy="346" r="4" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="162" cy="186" r="4" fill="url(#goldBadge)" opacity="0.8"/>

  <!-- ===== 结构化 SM ===== -->
  <!-- M — 几何化山型，更精确的线条 -->
  <path d="M 225,345
           C 242,295 255,255 258,230
           C 262,255 280,290 300,286
           C 320,282 338,255 342,230
           C 345,255 358,295 375,345"
        fill="none" stroke="url(#goldSM)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — 更克制的曲线，穿行于 M 中 -->
  <path d="M 370,225
           C 320,200 278,215 283,252
           C 288,288 352,282 335,310
           C 318,338 268,342 255,328"
        fill="none" stroke="url(#goldSM)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 品牌文字 ===== -->
  <text x="300" y="495" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="46" font-weight="600" fill="#D4AF37" letter-spacing="8">
    SENSEMIND
  </text>

  <text x="300" y="538" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="500" fill="#C9A84C" letter-spacing="12">
    风味求索
  </text>

  <line x1="200" y1="554" x2="400" y2="554" stroke="url(#goldBadge)" stroke-width="0.8" opacity="0.35"/>

  <text x="300" y="578" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', sans-serif"
        font-size="11" font-weight="400" fill="#8B7A4E" letter-spacing="4" opacity="0.7">
    风味求索（杭州）生物科技有限公司
  </text>

  <text x="300" y="600" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="300" fill="#6B5A2E" letter-spacing="5" opacity="0.5">
    FROM SCIENCE TO ART · RELIABLE FLAVOR SOLUTIONS
  </text>
</svg>
