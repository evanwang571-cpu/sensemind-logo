<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 640" width="600" height="640">
  <defs>
    <linearGradient id="goldHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49D30"/>
      <stop offset="100%" stop-color="#9B7A2E"/>
    </linearGradient>
    <linearGradient id="goldS" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0C878"/>
      <stop offset="40%" stop-color="#EDE0A0"/>
      <stop offset="100%" stop-color="#F5EDC0"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="600" height="640" fill="url(#bg)"/>

  <!-- ===== 商务六边形外框 ===== -->
  <!-- 外框 -->
  <polygon points="300,103 440,184 440,346 300,427 160,346 160,184"
           fill="none" stroke="url(#goldHex)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 内框 -->
  <polygon points="300,126 418,195 418,335 300,404 182,335 182,195"
           fill="url(#goldHex)" fill-opacity="0.03"
           stroke="url(#goldHex)" stroke-width="1" stroke-linejoin="round"/>

  <!-- 六边形顶点 -->
  <circle cx="300" cy="103" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="440" cy="184" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="440" cy="346" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="300" cy="427" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="160" cy="346" r="3.5" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="160" cy="184" r="3.5" fill="url(#goldHex)" opacity="0.7"/>

  <!-- ===== 艺术版 SM（原封不动保留） ===== -->
  <!-- M — 山型，粗 15px -->
  <path d="M 220,365
           C 238,300 248,250 250,220
           C 256,248 278,290 295,280
           C 310,270 318,258 326,258
           C 334,258 342,270 357,280
           C 374,290 396,248 402,220
           C 404,250 414,300 432,365"
        fill="none" stroke="url(#goldM)" stroke-width="15"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — 细 5px，亮金 -->
  <path d="M 435,240
           C 365,200 305,225 318,268
           C 332,312 430,298 405,338
           C 382,372 310,376 295,358"
        fill="none" stroke="url(#goldS)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 品牌文字 ===== -->
  <text x="300" y="500" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48" letter-spacing="4">
    <tspan font-weight="300" fill="#D4AF37">Sense</tspan><tspan font-weight="600" fill="#E8D48B">Mind</tspan>
  </text>

  <text x="300" y="545" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="25" font-weight="400" fill="#C9A84C" letter-spacing="14">
    风味求索
  </text>

  <line x1="200" y1="560" x2="400" y2="560" stroke="url(#goldHex)" stroke-width="0.8" opacity="0.3"/>

  <text x="300" y="584" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', sans-serif"
        font-size="11" font-weight="400" fill="#8B7A4E" letter-spacing="4" opacity="0.7">
    风味求索（杭州）生物科技有限公司
  </text>

  <text x="300" y="606" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="300" fill="#6B5A2E" letter-spacing="5" opacity="0.5">
    FROM SCIENCE TO ART · RELIABLE FLAVOR SOLUTIONS
  </text>
</svg>
