<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49D30"/>
      <stop offset="100%" stop-color="#9B7A2E"/>
    </linearGradient>
    <linearGradient id="goldS" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0C878"/>
      <stop offset="40%" stop-color="#EDE0A0"/>
      <stop offset="100%" stop-color="#F5EDC0"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" rx="48" fill="url(#bg)"/>

  <!-- 六边形外框 -->
  <polygon points="200,80 304,140 304,260 200,320 96,260 96,140"
           fill="none" stroke="url(#goldHex)" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="200,100 284,148 284,252 200,300 116,252 116,148"
           fill="url(#goldHex)" fill-opacity="0.03"
           stroke="url(#goldHex)" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- 顶点 -->
  <circle cx="200" cy="80" r="3" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="304" cy="140" r="3" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="304" cy="260" r="3" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="200" cy="320" r="3" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="96" cy="260" r="3" fill="url(#goldHex)" opacity="0.7"/>
  <circle cx="96" cy="140" r="3" fill="url(#goldHex)" opacity="0.7"/>

  <!-- M — 粗 13px -->
  <path d="M 145,270 C 158,222 166,185 168,162 C 173,185 190,218 202,210 C 213,203 220,194 226,194 C 232,194 239,203 250,210 C 262,218 279,185 284,162 C 286,185 294,222 307,270"
        fill="none" stroke="url(#goldM)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — 细 4.5px -->
  <path d="M 308,180 C 258,150 213,168 222,198 C 232,228 302,218 284,248 C 268,274 216,276 204,264"
        fill="none" stroke="url(#goldS)" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
