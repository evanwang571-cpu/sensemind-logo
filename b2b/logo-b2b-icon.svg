  <!-- SM -->
  <path d="M 118,282 C 135,218 145,175 147,142 C 153,170 178,212 192,200 C 206,189 213,177 220,177 C 227,177 234,189 248,200 C 262,212 287,170 293,142 C 295,175 305,218 322,282"
