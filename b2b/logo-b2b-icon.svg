<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8942E"/>
      <stop offset="100%" stop-color="#8B6918"/>
    </linearGradient>
    <linearGradient id="goldSM" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#E0C878"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" rx="48" fill="url(#bg)"/>

  <!-- 六边形徽章 -->
  <polygon points="200,82 300,140 300,260 200,318 100,260 100,140"
           fill="none" stroke="url(#goldBadge)" stroke-width="2.8" stroke-linejoin="round"/>
  <polygon points="200,103 282,150 282,250 200,297 118,250 118,150"
           fill="url(#goldBadge)" fill-opacity="0.04"
           stroke="url(#goldBadge)" stroke-width="0.6" stroke-linejoin="round" stroke-opacity="0.2"/>

  <!-- 顶点 -->
  <circle cx="200" cy="82" r="3.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="300" cy="140" r="3.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="300" cy="260" r="3.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="200" cy="318" r="3.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="100" cy="260" r="3.5" fill="url(#goldBadge)" opacity="0.8"/>
  <circle cx="100" cy="140" r="3.5" fill="url(#goldBadge)" opacity="0.8"/>

  <!-- M -->
  <path d="M 148,248 C 160,215 170,188 172,170 C 175,188 188,212 200,210 C 212,208 225,188 228,170 C 230,188 240,215 252,248"
        fill="none" stroke="url(#goldSM)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S -->
  <path d="M 250,170 C 215,152 185,162 188,186 C 192,210 238,206 226,226 C 214,244 178,246 168,236"
        fill="none" stroke="url(#goldSM)" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
