<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="300" cy="300" r="270" fill="url(#bgGrad)"/>

  <!-- ===== 简约双环徽章 ===== -->
  <circle cx="300" cy="300" r="230" fill="none" stroke="url(#primaryGrad)" stroke-width="4"/>
  <circle cx="300" cy="300" r="218" fill="none" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.25"/>

  <!-- ===== 核心图符：香气分子扩散 ===== -->
  <!-- 中心六边形（分子核） -->
  <polygon points="300,220 370,260 370,340 300,380 230,340 230,260"
           fill="url(#primaryGrad)" opacity="0.08"
           stroke="url(#primaryGrad)" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- S 曲线（香气流动+品牌首字母） -->
  <path d="M 262,250
           C 320,220 342,240 338,278
           C 334,312 262,300 260,338
           C 258,378 330,375 345,355"
        fill="none" stroke="url(#primaryGrad)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 金色感受器 -->
  <circle cx="300" cy="295" r="7.5" fill="url(#goldGrad)"/>

  <!-- 香气扩散波纹（右侧三道弧） -->
  <path d="M 345,260 Q 380,260 385,280" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 345,280 Q 390,280 395,310" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M 335,310 Q 375,315 378,330" fill="none" stroke="url(#primaryGrad)" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- 六边形顶点金点 -->
  <circle cx="300" cy="220" r="4" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="370" cy="260" r="4" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="370" cy="340" r="4" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="300" cy="380" r="4" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="230" cy="340" r="4" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="230" cy="260" r="4" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- ===== 品牌文字 ===== -->
  <text x="300" y="505" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#1E293B" letter-spacing="8">
    SenseMind
  </text>

  <text x="300" y="545" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="25" font-weight="500" fill="#64748B" letter-spacing="12">
    风味求索
  </text>

  <line x1="220" y1="560" x2="380" y2="560" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.45"/>

  <text x="300" y="580" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400" fill="#94A3B8" letter-spacing="5">
    SMART • CLEAN • FLAVOR
  </text>
</svg>
