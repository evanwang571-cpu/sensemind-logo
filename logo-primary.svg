<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- 主色渐变：青瓷绿 → 深湖蓝 -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <!-- 金色点缀渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- 背景微渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </radialGradient>
  </defs>

  <!-- 底板圆（展示用，实际使用时透明） -->
  <circle cx="300" cy="300" r="270" fill="url(#bgGrad)"/>

  <!-- ===== 外环徽章 ===== -->
  <!-- 最外细环 -->
  <circle cx="300" cy="300" r="250" fill="none" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.2"/>
  <!-- 中环 -->
  <circle cx="300" cy="300" r="238" fill="none" stroke="url(#primaryGrad)" stroke-width="0.8" opacity="0.3"/>
  <!-- 主环 -->
  <circle cx="300" cy="300" r="225" fill="none" stroke="url(#primaryGrad)" stroke-width="4.5"/>

  <!-- ===== 核心图标区：分子六边形 ===== -->
  <!--
    顶点坐标（半径 135，中心 300,300，30° 旋转使顶边水平）:
    顶:    300, 183
    右上:  417, 250
    右下:  417, 383
    底:    300, 450
    左下:  183, 383
    左上:  183, 250
  -->
  <polygon points="300,183 417,250 417,383 300,450 183,383 183,250"
           fill="none" stroke="url(#primaryGrad)" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- 苯环式双键（化学结构感，仅三边交替） -->
  <line x1="200" y1="278" x2="233" y2="295" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="367" y1="305" x2="400" y2="322" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="192" x2="300" y2="210" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===== 内核标志：流动 S 曲线 ===== -->
  <!-- 形似飘散的香气 + 品牌首字母 S -->
  <path d="M 265,230
           C 325,200 345,215 340,255
           C 335,290 260,280 258,320
           C 256,360 330,358 342,340"
        fill="none" stroke="url(#primaryGrad)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 金色感受器节点（味蕾/感官的抽象表达） -->
  <circle cx="300" cy="278" r="7" fill="url(#goldGrad)"/>

  <!-- 六边形顶点上的金色小点 -->
  <circle cx="300" cy="183" r="4.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="417" cy="250" r="4.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="417" cy="383" r="4.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="300" cy="450" r="4.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="183" cy="383" r="4.5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="183" cy="250" r="4.5" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- ===== 品牌文字 ===== -->
  <!-- 英文品牌名 -->
  <text x="300" y="500" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#1E293B" letter-spacing="8">
    SenseMind
  </text>

  <!-- 中文品牌名 -->
  <text x="300" y="542" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Sans SC', 'Heiti SC', 'Microsoft YaHei', sans-serif"
        font-size="26" font-weight="500" fill="#64748B" letter-spacing="12">
    风味求索
  </text>

  <!-- 金色分隔线 -->
  <line x1="220" y1="558" x2="380" y2="558" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.45"/>

  <!-- 底部标语 -->
  <text x="300" y="580" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400" fill="#94A3B8" letter-spacing="5">
    FLAVOR INTELLIGENCE
  </text>
</svg>
